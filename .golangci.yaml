run:
  timeout: 5m
linters-settings:
  depguard:
    rules:
      main:
        list-mode: strict
        files:
          - $all
        allow:
          - $gostd
          - github.com/elazarl/goproxy
          - github.com/spf13/cast
          - golang.org/x/net
          - gopkg.in/h2non/gock.v1
          - moul.io/http2curl
linters:
  enable:
    - asciicheck
    - depguard
    - dogsled
    - durationcheck
    - errcheck
    - errorlint
    - gci
    - gofmt
    - goimports
    - gosec
    - misspell
    - nakedret
    - nilerr
    - nolintlint
    - revive
    - wastedassign
issues:
  exclude-rules:
    - linters:
        - structcheck
        - unused
      text: "`data` is unused"
    - linters:
        - staticcheck
      text: "SA1019:"
    - linters:
        - revive
      text: "var-naming:"
    - linters:
        - revive
      text: "exported:"
    - path: _test\.go
      linters:
        - gosec # security is not make sense in tests
